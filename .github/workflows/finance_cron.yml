name: Envoi des Infos Financières
on:
  # Permet de lancer le script manuellement depuis l'onglet "Actions" sur GitHub
  workflow_dispatch:

  # Déclenchement automatique (actuellement : tous les mercredis à 9h00 UTC)
  schedule:
    - cron: '0 9 * * *'

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # nécessaire pour que le job puisse push state.json
    steps:
    # 1. Récupère le code du dépôt (y compris state.json à jour)
    - name: Checker le code
      uses: actions/checkout@v4

    # 2. Installe Python
    - name: Configurer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Afficher heure d execution
      run: |
          echo "=== Heure d'exécution ==="
          echo "UTC  : $(date -u)"
          echo "Local: $(date)"

    # 3. Installe les dépendances (yfinance, requests)
    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Lance le script en lui passant les Secrets GitHub
    - name: Exécuter le script Python
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python auto_bot_github.py

    # 5. Sauvegarde l'état (state.json) dans le repo pour le prochain run
    - name: Sauvegarder l'état (state.json)
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add state.json
        git diff --staged --quiet || git commit -m "Update state.json [skip ci]"
        git push
