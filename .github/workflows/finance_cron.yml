name: Envoi des Infos Financières

on:
  # Permet de lancer le script manuellement depuis l'onglet "Actions" sur GitHub
  workflow_dispatch:
  
  # Déclenchement automatique (Exemple : Tous les jours à 8h00 UTC)
  schedule:
    - cron: '45 5 * * *'

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupère le code du dépôt
    - name: Checker le code
      uses: actions/checkout@v4

    # 2. Installe Python
    - name: Configurer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Installe les dépendances (yfinance, requests)
    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Lance le script en lui passant les Secrets GitHub
    - name: Exécuter le script Python
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python auto_bot_github.py
